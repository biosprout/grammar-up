<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRAMMAR UP! 文法・英作文トレーニング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F4FB;--panel:#FFFFFF;--primary:#3D2FB8;--primary-light:#6B5CE7;
    --accent:#FF8A3D;--success:#18C29C;--danger:#FF5A6E;
    --text:#1A1A2E;--sub:#7A7A94;--border:#E9E9F4;
    --shadow:0 8px 28px rgba(61,47,184,.10);--shadow-sm:0 4px 14px rgba(61,47,184,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Noto Sans JP',system-ui,sans-serif;color:var(--text);
    background:linear-gradient(160deg,#EEEcFB 0%,#F4F4FB 40%,#F0F6FB 100%);min-height:100dvh;display:flex;justify-content:center;}
  .app{width:100%;max-width:480px;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;box-shadow:0 0 50px rgba(61,47,184,.06);}
  .topbar{padding:18px 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 70%,rgba(244,244,251,0));}
  .brand{display:flex;flex-direction:column;line-height:1.05}
  .brand .logo{font-family:'Poppins';font-weight:800;font-size:23px;letter-spacing:-.5px;color:var(--primary)}
  .brand .logo span{color:var(--accent)}
  .brand .sub{font-size:11px;color:var(--sub);font-weight:500;margin-top:2px}
  .screen{flex:1;overflow-y:auto;padding:6px 20px 40px;-webkit-overflow-scrolling:touch}
  .ring-card{background:var(--panel);border-radius:24px;padding:22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:20px;margin-bottom:18px;}
  .ring{position:relative;width:96px;height:96px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:'Poppins';font-size:24px;font-weight:800;color:var(--primary);line-height:1}
  .ring .pct small{font-size:9px;color:var(--sub);font-weight:600;margin-top:2px}
  .ring-info h2{font-size:15px;font-weight:900;margin-bottom:8px}
  .ring-info .stat{display:flex;gap:14px}
  .ring-info .stat div{font-size:11px;color:var(--sub);font-weight:600}
  .ring-info .stat b{display:block;font-family:'Poppins';font-size:19px;color:var(--text);font-weight:700}
  .section-label{font-size:12px;font-weight:800;color:var(--sub);margin:8px 2px 10px;letter-spacing:.3px}
  .chips{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:10px 15px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:.15s;white-space:nowrap;}
  .chip small{display:block;font-size:10px;color:var(--sub);font-weight:600;margin-top:1px}
  .chip:active{transform:scale(.97)}
  .chip.weak{border-color:var(--danger);color:var(--danger)}
  .cards2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mode{background:var(--panel);border-radius:20px;padding:18px 16px;cursor:pointer;box-shadow:var(--shadow-sm);border:1.5px solid transparent;transition:.15s;display:flex;flex-direction:column;gap:8px;}
  .mode:active{transform:scale(.97)}
  .mode .ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .mode h3{font-size:15px;font-weight:900}
  .mode p{font-size:11px;color:var(--sub);font-weight:500;line-height:1.4}
  .mode.trans .ic{background:#FFE9DB}
  .mode.essay .ic{background:#DEF7F0}
  .mode.mix .ic{background:#EAE7FB}
  .mode.review .ic{background:#FDE4E8}
  .btn{border:none;border-radius:14px;font-family:inherit;font-weight:800;font-size:15px;padding:15px;cursor:pointer;transition:.15s;width:100%;}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-ghost{background:var(--panel);color:var(--primary);border:1.5px solid var(--border)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-success{background:var(--success);color:#fff}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--sub);font-weight:700;font-size:14px;cursor:pointer;padding:6px 2px;margin-bottom:8px;font-family:inherit;}
  .mode-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .mode-head h2{font-size:17px;font-weight:900}
  .counter{font-family:'Poppins';font-weight:700;color:var(--sub);font-size:14px}
  .progress-line{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:16px}
  .progress-line i{display:block;height:100%;background:var(--primary);border-radius:999px;transition:width .3s}
  .q-card{background:var(--panel);border-radius:20px;padding:22px 18px;box-shadow:var(--shadow);margin-bottom:14px}
  .q-topic{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
  .q-topic{display:flex;align-items:center;gap:8px}
  .lvb{font-size:9px;padding:3px 8px;border-radius:7px;font-weight:800;text-transform:none;letter-spacing:0}
  .lvb.easy{background:#DEF7F0;color:#0B8A6B}
  .lvb.std{background:#EAE7FB;color:var(--primary)}
  .lvb.hard{background:#FFE4E8;color:var(--danger)}
  .q-text{font-size:19px;font-weight:700;line-height:1.5}
  .q-jp{font-size:15px;color:var(--sub);font-weight:600;margin-top:8px}
  .choices{display:grid;gap:10px;margin-bottom:6px}
  .choice{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:15px;font-family:inherit;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;transition:.12s;}
  .choice:active{transform:scale(.99)}
  .choice.correct{background:var(--success);border-color:var(--success);color:#fff}
  .choice.wrong{background:var(--danger);border-color:var(--danger);color:#fff}
  .choice.dim{opacity:.5}
  .order-area{min-height:56px;background:#FAFAFE;border:1.5px dashed var(--border);border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-content:flex-start}
  .order-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .token{background:var(--panel);border:1.5px solid var(--border);border-radius:11px;padding:9px 14px;font-family:'Poppins';font-weight:600;font-size:15px;color:var(--text);cursor:pointer;transition:.1s}
  .token:active{transform:scale(.95)}
  .token.placed{background:var(--primary);border-color:var(--primary);color:#fff}
  .field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:13px;font-family:inherit;font-size:16px;color:var(--text);background:#FCFCFE}
  .field textarea{resize:vertical;min-height:120px;line-height:1.6}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--primary-light)}
  .feedback{border-radius:14px;padding:15px;margin-bottom:12px}
  .feedback.ok{background:#E7FAF4;border:1.5px solid var(--success)}
  .feedback.ng{background:#FFF0F2;border:1.5px solid var(--danger)}
  .feedback .label{font-weight:800;font-size:14px;margin-bottom:6px}
  .feedback.ok .label{color:var(--success)}
  .feedback.ng .label{color:var(--danger)}
  .feedback .explain{font-size:13px;color:var(--text);line-height:1.6}
  .feedback .ans{font-family:'Poppins';font-weight:700;color:var(--primary);font-size:16px}
  .model-box{background:#F3F2FD;border-radius:14px;padding:15px;margin-bottom:12px}
  .model-box h4{font-size:11px;font-weight:800;color:var(--sub);letter-spacing:.4px;margin-bottom:8px}
  .model-box .m{font-size:16px;font-weight:600;line-height:1.6;margin-bottom:7px;color:var(--text)}
  .model-box .m b{color:var(--primary);font-family:'Poppins';font-weight:700;margin-right:6px}
  .points{list-style:none;margin-top:6px}
  .points li{font-size:13px;color:var(--text);font-weight:600;padding:5px 0 5px 20px;position:relative;line-height:1.5}
  .points li::before{content:'✓';position:absolute;left:0;color:var(--success);font-weight:800}
  .row2{display:flex;gap:10px}
  .row2 .btn{flex:1}
  .result{text-align:center;padding:28px 10px}
  .result .emoji{font-size:52px;margin-bottom:4px}
  .result .big{font-family:'Poppins';font-size:56px;font-weight:800;color:var(--primary);line-height:1}
  .result h2{font-size:19px;font-weight:900;margin:10px 0 4px}
  .result p{color:var(--sub);font-weight:600;font-size:13px;margin-bottom:18px}
  .essay-list{display:flex;flex-direction:column;gap:10px}
  .essay-row{background:var(--panel);border-radius:15px;padding:15px 16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.12s;border:1.5px solid transparent}
  .essay-row:active{transform:scale(.99)}
  .essay-row.done{border-color:var(--success)}
  .essay-row .p{font-size:14px;font-weight:700;line-height:1.5}
  .essay-row .tag{font-size:10px;font-weight:800;color:var(--sub);margin-top:6px}
  .essay-row.done .tag{color:var(--success)}
  .help{font-size:11px;color:var(--sub);line-height:1.6;margin-top:8px}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 22px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pop{position:fixed;inset:0;pointer-events:none;z-index:40;display:flex;align-items:center;justify-content:center}
  .pop span{position:absolute;font-size:24px;animation:fly .8s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="brand"><div class="logo">GRAMMAR <span>UP!</span></div><div class="sub">文法・英作文 / 英検準1級まで</div></div></div>
  <div class="screen" id="screen"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const STORE_KEY='grammarup_chihoko_v1';
let mem=null;

const TOPICS=[
  {id:'basic',name:'基本文型・be動詞'},
  {id:'tense',name:'時制（過去・未来・進行）'},
  {id:'modal',name:'助動詞（基礎）'},
  {id:'wh',name:'疑問詞・疑問文'},
  {id:'prep',name:'前置詞・冠詞'},
  {id:'perf',name:'現在完了・完了形'},
  {id:'pass',name:'受動態'},
  {id:'inf',name:'不定詞・動名詞'},
  {id:'part',name:'分詞・分詞構文'},
  {id:'rel',name:'関係詞'},
  {id:'comp',name:'比較'},
  {id:'subj',name:'仮定法'},
  {id:'aux',name:'助動詞・接続詞'},
];

// type: mc(4択) / order(整序) / fill(空所補充)
const GRAMMAR=[
  {id:'b1',t:'basic',level:'easy',type:'mc',q:'She ___ a teacher.',ch:['am','is','are','be'],a:1,ex:'主語が3人称単数の be 動詞は is。'},
  {id:'b2',t:'basic',level:'easy',type:'mc',q:'I ___ from Japan.',ch:['am','is','are','be'],a:0,ex:'主語が I の be 動詞は am。'},
  {id:'b3',t:'basic',level:'easy',type:'mc',q:'They ___ students.',ch:['am','is','are','be'],a:2,ex:'主語が複数の be 動詞は are。'},
  {id:'b4',t:'basic',level:'easy',type:'mc',q:'He ___ soccer every day.',ch:['play','plays','playing','played'],a:1,ex:'3人称単数現在は動詞に s。plays。'},
  {id:'b5',t:'basic',level:'easy',type:'mc',q:'I ___ not like coffee.',ch:['am','do','does','is'],a:1,ex:'一般動詞の否定は do not。I do not like。'},
  {id:'b6',t:'basic',level:'easy',type:'mc',q:'___ she have a dog?',ch:['Do','Does','Is','Are'],a:1,ex:'3人称単数の疑問文は Does + 主語 + 動詞の原形。'},
  {id:'b7',t:'basic',level:'easy',type:'mc',q:'___ down, please.',ch:['Sit','Sitting','Sat','To sit'],a:0,ex:'命令文は動詞の原形で始める。Sit down。'},
  {id:'b8',t:'basic',level:'easy',type:'mc',q:'___ be late.',ch:['Do not','Not','No','Does not'],a:0,ex:'否定の命令文は Do not + 原形。'},
  {id:'b9',t:'basic',level:'easy',type:'mc',q:'There ___ a book on the desk.',ch:['is','are','am','be'],a:0,ex:'単数のものには There is。'},
  {id:'b10',t:'basic',level:'easy',type:'mc',q:'There ___ many people in the park.',ch:['is','are','was','be'],a:1,ex:'複数のものには There are。'},
  {id:'b11',t:'basic',level:'easy',type:'fill',q:'My sister ___ to school by bus. (go)',a:['goes'],ex:'3人称単数現在。go は goes。'},
  {id:'b12',t:'basic',level:'easy',type:'mc',q:'We ___ very happy today.',ch:['am','is','are','be'],a:2,ex:'主語が複数(we)の be 動詞は are。'},
  {id:'te1',t:'tense',level:'easy',type:'mc',q:'I ___ to the park yesterday.',ch:['go','went','gone','going'],a:1,ex:'yesterday は過去。go の過去形 went。'},
  {id:'te2',t:'tense',level:'easy',type:'mc',q:'She ___ TV last night.',ch:['watch','watches','watched','watching'],a:2,ex:'last night は過去。watched。'},
  {id:'te3',t:'tense',level:'easy',type:'mc',q:'He ___ not come to school yesterday.',ch:['do','does','did','is'],a:2,ex:'一般動詞の過去の否定は did not + 原形。'},
  {id:'te4',t:'tense',level:'easy',type:'mc',q:'I ___ study English tomorrow.',ch:['will','am','was','did'],a:0,ex:'tomorrow は未来。will + 原形。'},
  {id:'te5',t:'tense',level:'easy',type:'mc',q:'She is ___ to visit Kyoto next week.',ch:['go','going','went','goes'],a:1,ex:'be going to + 原形(〜する予定)。is going to visit。'},
  {id:'te6',t:'tense',level:'easy',type:'mc',q:'They ___ playing soccer now.',ch:['is','am','are','be'],a:2,ex:'現在進行形 be + ~ing。主語複数で are。'},
  {id:'te7',t:'tense',level:'easy',type:'mc',q:'I ___ reading a book when he called.',ch:['am','was','were','is'],a:1,ex:'過去進行形 was/were + ~ing。主語 I で was。'},
  {id:'te8',t:'tense',level:'easy',type:'fill',q:'He is ___ a letter now. (write)',a:['writing'],ex:'現在進行形は be + ~ing。write は writing。'},
  {id:'te9',t:'tense',level:'easy',type:'mc',q:'What ___ you do last Sunday?',ch:['do','did','does','are'],a:1,ex:'過去の疑問文は did + 主語 + 原形。'},
  {id:'te10',t:'tense',level:'easy',type:'mc',q:'It ___ raining when I woke up.',ch:['is','was','are','be'],a:1,ex:'過去進行形。主語 it で was raining。'},
  {id:'te11',t:'tense',level:'easy',type:'mc',q:'We ___ a great time at the party.',ch:['have','has','had','having'],a:2,ex:'過去の文(at the party)。have の過去 had。'},
  {id:'te12',t:'tense',level:'easy',type:'mc',q:'___ you free tomorrow?',ch:['Are','Were','Did','Does'],a:0,ex:'be 動詞の疑問文。主語 you で Are。'},
  {id:'m1',t:'modal',level:'easy',type:'mc',q:'I ___ swim very well.',ch:['can','am','do','will be'],a:0,ex:'「〜できる」能力の can。can swim。'},
  {id:'m2',t:'modal',level:'easy',type:'mc',q:'You ___ wash your hands before lunch.',ch:['should','are','do','being'],a:0,ex:'「〜すべき」助言の should。'},
  {id:'m3',t:'modal',level:'easy',type:'mc',q:'___ I open the window?',ch:['May','Do','Am','Did'],a:0,ex:'「〜してもよいですか」許可の May I。'},
  {id:'m4',t:'modal',level:'easy',type:'mc',q:'We ___ to finish this today.',ch:['have','has','having','are'],a:0,ex:'「〜しなければならない」have to。主語 we で have to。'},
  {id:'m5',t:'modal',level:'easy',type:'mc',q:'He ___ be at home; the lights are on.',ch:['must','can not','should not','may not'],a:0,ex:'「〜にちがいない」強い推量の must。'},
  {id:'m6',t:'modal',level:'easy',type:'mc',q:'You ___ not run here.',ch:['must','do','are','will'],a:0,ex:'「〜してはいけない」禁止の must not。'},
  {id:'m7',t:'modal',level:'easy',type:'mc',q:'___ you help me?',ch:['Could','Did','Was','Do you can'],a:0,ex:'「〜してくれますか」ていねいな依頼の Could you。'},
  {id:'m8',t:'modal',level:'easy',type:'mc',q:'It ___ rain this afternoon.',ch:['may','do','is','are'],a:0,ex:'「〜かもしれない」推量の may。'},
  {id:'m9',t:'modal',level:'easy',type:'mc',q:'She ___ speak three languages.',ch:['can','is','does','has'],a:0,ex:'能力の can。can speak。'},
  {id:'m10',t:'modal',level:'easy',type:'mc',q:'You ___ better see a doctor.',ch:['had','have','has','did'],a:0,ex:'「〜したほうがよい」had better + 原形。'},
  {id:'m11',t:'modal',level:'easy',type:'mc',q:'Students ___ wear a uniform at this school.',ch:['must','are','do','will be'],a:0,ex:'「〜しなければならない」義務の must。'},
  {id:'w1',t:'wh',level:'easy',type:'mc',q:'___ is your name?',ch:['What','Who','Where','When'],a:0,ex:'名前をたずねる。What is your name?'},
  {id:'w2',t:'wh',level:'easy',type:'mc',q:'___ do you live?',ch:['What','Who','Where','Why'],a:2,ex:'場所をたずねる Where。'},
  {id:'w3',t:'wh',level:'easy',type:'mc',q:'___ is your birthday?',ch:['What','When','Where','Who'],a:1,ex:'時をたずねる When。'},
  {id:'w4',t:'wh',level:'easy',type:'mc',q:'___ are you crying?',ch:['What','Why','Where','Who'],a:1,ex:'理由をたずねる Why。'},
  {id:'w5',t:'wh',level:'easy',type:'mc',q:'___ much is this bag?',ch:['How','What','Why','Who'],a:0,ex:'値段をたずねる How much。'},
  {id:'w6',t:'wh',level:'easy',type:'mc',q:'___ old are you?',ch:['How','What','When','Who'],a:0,ex:'年齢をたずねる How old。'},
  {id:'w7',t:'wh',level:'easy',type:'mc',q:'___ is that man?',ch:['What','Who','Where','Why'],a:1,ex:'人をたずねる Who。'},
  {id:'w8',t:'wh',level:'easy',type:'mc',q:'___ bag is this?',ch:['Whose','Who','What','Which'],a:0,ex:'「だれの」所有をたずねる Whose。'},
  {id:'w9',t:'wh',level:'easy',type:'mc',q:'___ do you go to school?',ch:['What','How','Who','Whose'],a:1,ex:'手段をたずねる How(どうやって)。'},
  {id:'w10',t:'wh',level:'easy',type:'mc',q:'___ one do you like, this or that?',ch:['Which','What','Who','Where'],a:0,ex:'2つから選ぶときは Which。'},
  {id:'pr1',t:'prep',level:'easy',type:'mc',q:'I get up ___ seven.',ch:['at','on','in','to'],a:0,ex:'時刻には at。at seven。'},
  {id:'pr2',t:'prep',level:'easy',type:'mc',q:'My birthday is ___ May.',ch:['at','on','in','to'],a:2,ex:'月には in。in May。'},
  {id:'pr3',t:'prep',level:'easy',type:'mc',q:'I will meet you ___ Monday.',ch:['at','on','in','to'],a:1,ex:'曜日・日付には on。on Monday。'},
  {id:'pr4',t:'prep',level:'easy',type:'mc',q:'The cat is ___ the table.',ch:['on','in','at','to'],a:0,ex:'「〜の上に」接触は on。'},
  {id:'pr5',t:'prep',level:'easy',type:'mc',q:'She lives ___ Tokyo.',ch:['at','on','in','to'],a:2,ex:'広い場所(都市)には in。'},
  {id:'pr6',t:'prep',level:'easy',type:'mc',q:'I go to school ___ bus.',ch:['by','on','in','with'],a:0,ex:'交通手段には by。by bus。'},
  {id:'pr7',t:'prep',level:'easy',type:'mc',q:'This is a present ___ you.',ch:['to','for','at','on'],a:1,ex:'「〜のための」は for。'},
  {id:'pr8',t:'prep',level:'easy',type:'mc',q:'I have studied English ___ three years.',ch:['for','since','at','in'],a:0,ex:'期間には for。for three years。'},
  {id:'pr9',t:'prep',level:'easy',type:'mc',q:'Wait ___ me here.',ch:['for','to','at','on'],a:0,ex:'wait for(〜を待つ)。'},
  {id:'pr10',t:'prep',level:'easy',type:'mc',q:'I am good ___ math.',ch:['at','in','on','to'],a:0,ex:'be good at(〜が得意)。'},
  {id:'pr11',t:'prep',level:'easy',type:'mc',q:'He is afraid ___ dogs.',ch:['of','at','in','on'],a:0,ex:'be afraid of(〜をこわがる)。'},

function load(){
  try{const raw=localStorage.getItem(STORE_KEY);if(raw)return JSON.parse(raw);
    const init={progress:{},essays:{}};localStorage.setItem(STORE_KEY,JSON.stringify(init));return init;
  }catch(e){if(!mem)mem={progress:{},essays:{}};return mem;}
}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){mem=state;}}
let state=load();
if(!state.progress)state.progress={};
if(!state.essays)state.essays={};

const $=id=>document.getElementById(id);
const screen=$('screen');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function norm(s){return s.toLowerCase().replace(/[.,!?;:]/g,'').replace(/\s+/g,' ').trim()}
function topicName(id){const o=TOPICS.find(x=>x.id===id);return o?o.name:''}
function lv(l){return l==='easy'?'<span class="lvb easy">やさしい</span>':l==='hard'?'<span class="lvb hard">応用</span>':'<span class="lvb std">標準</span>';}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600)}
function pop(){const p=document.createElement('div');p.className='pop';const e=['⭐','✨','🎉','💫'];for(let i=0;i<8;i++){const s=document.createElement('span');s.textContent=e[i%4];s.style.setProperty('--dx',(Math.random()*200-100)+'px');s.style.setProperty('--dy',(-Math.random()*160-40)+'px');p.appendChild(s)}document.body.appendChild(p);setTimeout(()=>p.remove(),800)}
function record(id,ok){state.progress[id]={done:true,correct:ok};save()}
function weakGrammar(){return GRAMMAR.filter(g=>state.progress[g.id]&&state.progress[g.id].correct===false)}

/* ===== ホーム ===== */

  const total=drillIds.length;
  const rate=done?Math.round(correct/done*100):0;
  const C=2*Math.PI*42,off=C*(1-(done/total));

  const tchips=TOPICS.map(t=>{const n=GRAMMAR.filter(g=>g.t===t.id).length;
    return `<div class="chip" onclick="startGrammar('${t.id}')">${t.name}<small>${n}問</small></div>`}).join('');
  screen.innerHTML=`
    <div class="ring-card">
      <div class="ring"><svg width="96" height="96">

    <div class="section-label">📘 文法ドリル</div>
    <button class="btn btn-accent" style="margin-bottom:12px" onclick="startGrammar('order')">🔀 並び替えだけを練習</button>
    <div class="chips">${tchips}</div>

/* ===== 文法ドリル ===== */
let gs={list:[],i:0,score:0,answered:false,placed:[]};
function startGrammar(topic){
  let list;
  if(topic==='mix')list=shuffle(GRAMMAR).slice(0,10);
  else if(topic==='review'){list=shuffle(weakGrammar());if(!list.length){toast('苦手はまだないよ。まず解いてみよう');return;}}
  else if(topic==='order')list=shuffle(GRAMMAR.filter(g=>g.type==='order')).slice(0,15);
  else list=shuffle(GRAMMAR.filter(g=>g.t===topic));
  gs={list,i:0,score:0,answered:false,placed:[]};
  renderGrammar();
}
function renderGrammar(){
  if(gs.i>=gs.list.length)return renderGrammarResult();
  const q=gs.list[gs.i];gs.answered=false;gs.placed=[];
  let body='';
  if(q.type==='mc'){
    body=`<div class="q-card"><div class="q-topic">${topicName(q.t)}${lv(q.level)}</div><div class="q-text">${esc(q.q)}</div></div>
      <div class="choices">${q.ch.map((c,k)=>`<button class="choice" data-k="${k}" onclick="ansMc(${k})">${esc(c)}</button>`).join('')}</div>`;
  }else if(q.type==='fill'){
    body=`<div class="q-card"><div class="q-topic">${topicName(q.t)}${lv(q.level)}</div><div class="q-text">${esc(q.q)}</div></div>
      <div class="field" style="margin-bottom:12px"><input id="fillIn" placeholder="答えを入力" autocapitalize="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkFill()"></div>
      <button class="btn btn-primary" onclick="checkFill()">こたえる</button>`;
  }else if(q.type==='order'){
    const toks=shuffle(q.tok.map((w,k)=>({w,k})));
    body=`<div class="q-card"><div class="q-topic">${topicName(q.t)}${lv(q.level)}</div><div class="q-jp" style="margin:0;font-size:16px;color:var(--text);font-weight:700">${esc(q.jp)}</div></div>
      <div class="order-area" id="orderArea"></div>
      <div class="order-pool" id="orderPool">${toks.map(o=>`<div class="token" data-id="${o.k}" onclick="orderPick(this)">${esc(o.w)}</div>`).join('')}</div>
      <button class="btn btn-primary" onclick="checkOrder()">チェック</button>`;
  }
  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="mode-head"><h2>📘 文法ドリル</h2><span class="counter">${gs.i+1}/${gs.list.length}</span></div>
    <div class="progress-line"><i style="width:${gs.i/gs.list.length*100}%"></i></div>
    <div id="qbody">${body}</div>
    <div id="gfeed"></div>`;
  if(q.type==='fill')setTimeout(()=>{const el=$('fillIn');if(el)el.focus()},60);
}
function ansMc(k){
  if(gs.answered)return;gs.answered=true;
  const q=gs.list[gs.i],ok=k===q.a;
  document.querySelectorAll('.choice').forEach(b=>{const kk=+b.dataset.k;
    if(kk===q.a)b.classList.add('correct');else if(kk===k)b.classList.add('wrong');else b.classList.add('dim');b.onclick=null;});
  finishGrammar(ok,q);
}
function checkFill(){
  if(gs.answered)return;const q=gs.list[gs.i],v=$('fillIn').value;
  if(!v.trim()){toast('答えを入力してね');return;}
  gs.answered=true;const ok=q.a.some(a=>norm(a)===norm(v));
  const inp=$('fillIn');if(inp)inp.disabled=true;
  finishGrammar(ok,q);
}
function orderPick(el){
  const area=$('orderArea');
  if(el.parentNode===area){el.classList.remove('placed');$('orderPool').appendChild(el);}
  else{el.classList.add('placed');area.appendChild(el);}
}
function checkOrder(){
  if(gs.answered)return;const q=gs.list[gs.i];
  const placed=[...$('orderArea').children].map(e=>e.textContent);
  if(placed.length<q.tok.length){toast('全部のカードを並べてね');return;}
  gs.answered=true;const ok=placed.join(' ')===q.tok.join(' ');
  document.querySelectorAll('#orderPool .token,#orderArea .token').forEach(t=>t.onclick=null);
  finishGrammar(ok,q,placed.join(' '));
}
function finishGrammar(ok,q,userAns){
  record(q.id,ok);if(ok){gs.score++;pop();}
  const ansText=q.type==='mc'?q.ch[q.a]:(q.type==='fill'?q.a[0]:q.tok.join(' '));
  const fb=$('gfeed');
  fb.innerHTML=`<div class="feedback ${ok?'ok':'ng'}">
    <div class="label">${ok?'⭕ 正解！':'❌ おしい'}</div>
    ${ok?'':`<div class="explain" style="margin-bottom:6px">正解: <span class="ans">${esc(ansText)}</span></div>`}
    <div class="explain">${esc(q.ex||'')}</div>
  </div>
  <button class="btn btn-primary" onclick="gNext()">次へ ›</button>`;
  fb.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function gNext(){gs.i++;renderGrammar();}
function renderGrammarResult(){
  const total=gs.list.length,rate=total?Math.round(gs.score/total*100):0;
  let emoji='💪',msg='その調子！';
  if(rate===100){emoji='🏆';msg='全問正解！すばらしい';}
  else if(rate>=80){emoji='🎉';msg='よくできました';}
  else if(rate>=50){emoji='👍';msg='間違えた問題は復習で固めよう';}
  else{emoji='📖';msg='解説を読んで、もう一度';}
  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="result"><div class="emoji">${emoji}</div><div class="big">${gs.score}<span style="font-size:26px;color:var(--sub)">/${total}</span></div><h2>${msg}</h2><p>正答率 ${rate}%</p></div>
    <div class="row2"><button class="btn btn-ghost" onclick="renderHome()">ホーム</button><button class="btn btn-primary" onclick="renderHome()">続ける</button></div>`;
}

/* ===== 和文英訳 ===== */
let ts={list:[],i:0,score:0,shown:false};
function startTrans(){ts={list:shuffle(TRANS),i:0,score:0,shown:false};renderTrans();}
function renderTrans(){
  if(ts.i>=ts.list.length)return renderTransResult();
  const q=ts.list[ts.i];ts.shown=false;
  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="mode-head"><h2>🔤 和文英訳</h2><span class="counter">${ts.i+1}/${ts.list.length}</span></div>
    <div class="progress-line"><i style="width:${ts.i/ts.list.length*100}%"></i></div>
    <div class="q-card"><div class="q-topic">日本語を英語にしよう</div><div class="q-text">${esc(q.jp)}</div></div>
    <div class="field" style="margin-bottom:12px"><textarea id="transIn" placeholder="英語で書いてみよう" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea></div>
    <button class="btn btn-primary" onclick="showTrans()">答え合わせ</button>
    <div id="tfeed"></div>`;
  setTimeout(()=>{const el=$('transIn');if(el)el.focus()},60);
}
function showTrans(){
  if(ts.shown)return;ts.shown=true;const q=ts.list[ts.i];
  $('transIn').setAttribute('readonly','');
  $('tfeed').innerHTML=`
    <div class="model-box" style="margin-top:14px"><h4>模範解答</h4>
      ${q.models.map((m,k)=>`<div class="m"><b>${k+1}.</b>${esc(m)}</div>`).join('')}
      <ul class="points">${q.points.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
    </div>
    <p class="help" style="margin:0 0 12px">自分の英文と見比べて、意味が通じて文法が合っていれば「書けた」。違っていたら「もう一度」。</p>
    <div class="row2"><button class="btn btn-ghost" onclick="judgeTrans(false)">もう一度</button><button class="btn btn-success" onclick="judgeTrans(true)">書けた ✓</button></div>`;
  $('tfeed').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function judgeTrans(ok){record(ts.list[ts.i].id,ok);if(ok){ts.score++;pop();}ts.i++;renderTrans();}
function renderTransResult(){
  const total=ts.list.length,rate=total?Math.round(ts.score/total*100):0;
  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="result"><div class="emoji">${rate>=80?'🎉':'✏️'}</div><div class="big">${ts.score}<span style="font-size:26px;color:var(--sub)">/${total}</span></div><h2>おつかれさま</h2><p>「書けた」${ts.score}問 / 正答率 ${rate}%</p></div>
    <div class="row2"><button class="btn btn-ghost" onclick="renderHome()">ホーム</button><button class="btn btn-primary" onclick="startTrans()">もう一回</button></div>`;
}

/* ===== 自由英作文 ===== */
function renderEssayList(){
  screen.innerHTML=`
    <button class="back" onclick="renderHome()">‹ もどる</button>
    <div class="mode-head"><h2>📝 自由英作文</h2></div>
    <p class="help" style="margin:0 0 14px">準1級型の意見論述。自分の意見を書いてから、モデルアンサーとチェックリストで見直そう。書いた英文は保存される。</p>
    <div class="essay-list">
      ${ESSAYS.map((e,k)=>{const done=state.essays[e.id]&&state.essays[e.id].length>0;
        return `<div class="essay-row ${done?'done':''}" onclick="openEssay('${e.id}')"><div class="p">${esc(e.prompt)}</div><div class="tag">${done?'✓ 下書きあり':'未着手'}</div></div>`}).join('')}
    </div>`;
}
function openEssay(id){
  const e=ESSAYS.find(x=>x.id===id);const saved=state.essays[id]||'';
  screen.innerHTML=`
    <button class="back" onclick="renderEssayList()">‹ もどる</button>
    <div class="mode-head"><h2>📝 自由英作文</h2></div>
    <div class="q-card"><div class="q-topic">Question</div><div class="q-text" style="font-size:16px">${esc(e.prompt)}</div></div>
    <div class="field" style="margin-bottom:8px"><textarea id="essayIn" placeholder="ここに英語で意見を書こう"></textarea></div>
    <div class="help" id="wc" style="margin:0 0 12px">語数: 0</div>
    <div class="row2" style="margin-bottom:14px"><button class="btn btn-ghost" onclick="saveEssay('${id}')">保存</button><button class="btn btn-primary" onclick="showEssayModel('${id}')">モデルを見る</button></div>
    <div id="efeed"></div>`;
  const ta=$('essayIn');ta.value=saved;
  const wc=()=>{const n=ta.value.trim()?ta.value.trim().split(/\s+/).length:0;$('wc').textContent='語数: '+n;};
  ta.addEventListener('input',wc);wc();
}
function saveEssay(id){state.essays[id]=$('essayIn').value;save();toast('保存したよ ✓');}
function showEssayModel(id){
  const e=ESSAYS.find(x=>x.id===id);state.essays[id]=$('essayIn').value;save();
  $('efeed').innerHTML=`
    <div class="model-box"><h4>モデルアンサー（あくまで一例）</h4><div class="m">${esc(e.model)}</div></div>
    <div class="model-box" style="background:#FFF6EF"><h4>自己チェック</h4><ul class="points">${ESSAY_CHECK.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>
    <p class="help" style="margin:0 0 12px">モデルと自分の文を見比べて、チェックリストで足りない点を確認しよう。</p>
    <div class="row2"><button class="btn btn-ghost" onclick="renderEssayList()">一覧へ</button><button class="btn btn-success" onclick="toast('おつかれさま！');renderEssayList()">見直し完了</button></div>`;
  $('efeed').scrollIntoView({behavior:'smooth',block:'nearest'});
}

renderHome();
</script>
</body>
</html>
